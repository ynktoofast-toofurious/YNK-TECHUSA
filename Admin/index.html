<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Viewer | YNK-Tech USA</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ACCESS GATE -->
    <div id="access-gate" class="gate-overlay">
        <div class="gate-card">
            <div class="gate-logo">
                <img src="../Logo/YNK/1.png" alt="YNK-Tech USA" class="gate-logo-img">
            </div>
            <p class="gate-label">RESUME ACCESS</p>
            <h1 class="gate-title">View Resume</h1>
            <p class="gate-subtitle">Enter your access code to view the industry-specific resume.</p>

            <form class="gate-form" onsubmit="return false;">
                <div class="input-wrapper">
                    <input type="password" id="access-input" class="gate-input" placeholder="Access Code" autocomplete="off" maxlength="64">
                    <button type="button" class="eye-toggle" onclick="togglePw()" title="Show/hide code" aria-label="Toggle visibility">
                        <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg class="eye-closed hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <button type="submit" class="gate-btn" onclick="verifyAccess()">VIEW RESUME</button>
                <p id="gate-error" class="gate-error" aria-live="polite"></p>
            </form>

            <div class="gate-footer">
                <p class="gate-footer-text">Access codes are provided by YNK-Tech USA for authorized viewers only.</p>
            </div>
        </div>
    </div>

    <!-- RESUME VIEWER -->
    <main id="resume-viewer" class="hidden">
        <header class="viewer-header">
            <a href="../index.html" class="header-logo-link">
                <img src="../Logo/YNK/1.png" alt="YNK-Tech USA" class="header-logo">
            </a>
            <div class="viewer-info">
                <span id="industry-badge" class="industry-badge"></span>
                <span class="viewer-title">Resume</span>
            </div>
            <div class="viewer-actions">
                <button id="download-btn" class="action-btn download-btn" onclick="downloadResume()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    DOWNLOAD
                </button>
                <button class="action-btn logout-btn" onclick="logout()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    EXIT
                </button>
            </div>
        </header>

        <div class="pdf-container">
            <div id="pdf-loading" class="pdf-loading">
                <div class="spinner"></div>
                <p>Loading resume...</p>
            </div>
            <iframe id="pdf-frame" class="pdf-frame" title="Resume PDF viewer"></iframe>
        </div>
    </main>

    <!-- TOAST -->
    <div id="toast" class="toast"></div>

    <script src="admin-data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
