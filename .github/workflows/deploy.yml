name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ynk-react/package-lock.json

      - name: Install dependencies
        working-directory: ynk-react
        run: npm ci

      - name: Build
        working-directory: ynk-react
        run: npm run build
        env:
          VITE_API_URL: https://enf1mo6r68.execute-api.us-east-1.amazonaws.com

      - name: Copy Admin portal into dist
        run: cp -r Admin/. ynk-react/dist/Admin/

      - name: Add SPA 404 fallback
        run: cp ynk-react/dist/index.html ynk-react/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ynk-react/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
